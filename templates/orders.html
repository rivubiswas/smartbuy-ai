{% extends 'base.html' %}

{% block content %}

<h1 class="text-3xl font-bold mb-6">📦 Your Orders</h1>

{% for order in orders %}

<div class="glass p-4 mb-4 rounded">

    <h2 class="text-xl">Order #{{ order.id }}</h2>

    <p>Total: ₹{{ order.total_price }}</p>

    <p>Status: 
        <span class="text-green-400">{{ order.status }}</span>
    </p>

    <p class="text-gray-400">{{ order.created_at }}</p>

</div>

{% endfor %}

{% endblock %}
