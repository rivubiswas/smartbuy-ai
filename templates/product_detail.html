<!DOCTYPE html>
<html>
<head>
<title>{{ product.name }}</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-6">

<a href="/" class="text-blue-400">← Back</a>

<div class="grid md:grid-cols-2 gap-6 mt-6">

<img src="{{ product.image.url }}" class="rounded">

<div>
<h1 class="text-3xl font-bold">{{ product.name }}</h1>
<p>{{ product.description }}</p>
<p class="text-blue-400 text-xl mt-2">₹{{ product.price }}</p>

<a href="/add-to-cart/{{product.id}}/">
<button class="mt-4 bg-green-500 px-6 py-2 rounded">Add to Cart</button>
</a>
</div>

</div>

<!-- REVIEW -->
<div class="mt-10">
<h2>Add Review</h2>

<form method="POST" action="/add-review/{{product.id}}/">
{% csrf_token %}
<textarea name="text" class="w-full p-2 text-black"></textarea>
<input type="number" name="rating" class="text-black">
<button class="bg-blue-500 px-4 py-2 mt-2">Submit</button>
</form>
</div>

<!-- REVIEWS -->
{% for review in reviews %}
<div class="bg-gray-800 p-4 mt-2">
<p>{{ review.user.username }}</p>
<p>{{ review.text }}</p>
<p>⭐ {{ review.rating }}</p>
</div>
{% endfor %}

</body>
</html>
