{% extends 'base.html' %}

{% block content %}

<div class="max-w-md mx-auto glass p-6 rounded">

<h1 class="text-2xl mb-4">Login</h1>

<form method="POST">
{% csrf_token %}

<input name="username" placeholder="Username"
class="w-full p-2 mb-3 text-black">

<input name="password" type="password"
class="w-full p-2 mb-3 text-black">

<button class="w-full bg-blue-500 py-2 rounded">
Login
</button>

</form>

</div>

{% endblock %}
