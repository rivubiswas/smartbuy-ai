{% extends 'base.html' %}

{% block content %}

<h1 class="text-3xl font-bold mb-6">Checkout</h1>

<div class="glass p-6 rounded">

{% for item in items %}

<div class="flex justify-between mb-2">
    <p>{{ item.product.name }}</p>
    <p>₹{{ item.total_price }}</p>
</div>

{% endfor %}

<hr class="my-4">

<h2 class="text-xl font-bold">Total: ₹{{ total }}</h2>

<form method="POST">
{% csrf_token %}

<button class="mt-4 w-full bg-blue-500 py-2 rounded hover:bg-blue-600">
    Place Order
</button>

</form>

</div>

{% endblock %}
